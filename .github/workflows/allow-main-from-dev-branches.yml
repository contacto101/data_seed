name: main-branch-source-guard

on:
  pull_request:
    branches:
      - main

jobs:
  allow-main-from-dev-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            dev/arturo|dev/elianis|dev/daniel|dev/javico)
              echo "Allowed source branch: $HEAD_REF"
              ;;
            *)
              echo "Only dev/arturo, dev/elianis, dev/daniel, or dev/javico can merge into main. Got: $HEAD_REF"
              exit 1
              ;;
          esac
