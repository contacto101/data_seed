<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — Dataseed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050e06;--g:#00ff41;--text:#dff5e3;--sub:#7aaa84;--card:rgba(0,255,65,0.04);--card-b:rgba(0,255,65,0.16)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top right,rgba(0,255,65,.12),transparent 34%),var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:2rem}
main{max-width:720px;width:100%;border:1px solid var(--card-b);background:var(--card);border-radius:24px;padding:clamp(2rem,5vw,4rem);text-align:center;box-shadow:0 24px 80px rgba(0,255,65,.08)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:.02em;margin-bottom:2rem;color:var(--g)}
h1{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,6vw,4.5rem);line-height:1;margin-bottom:1.4rem;letter-spacing:-.04em}
p{font-size:1rem;line-height:1.8;color:var(--sub);max-width:560px;margin:0 auto 2rem}
a{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:var(--g);color:#031003;border-radius:999px;padding:.9rem 1.6rem;font-weight:700;box-shadow:0 0 32px rgba(0,255,65,.25)}
</style>
</head>
<body>
<main>
  <div class="logo">dataseed.cl</div>
  <h1>Gracias por contactarnos.</h1>
  <p>Recibimos tu mensaje correctamente. El equipo de Dataseed revisará la información y te responderá dentro de las próximas 48 horas hábiles.</p>
  <a href="/">Volver al sitio</a>
</main>
</body>
</html>
